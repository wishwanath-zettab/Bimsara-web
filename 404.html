<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bimsara Real Estate</title>
    <script>
      // Save the current path and redirect to index.html for SPA routing
      var path = window.location.pathname.replace('/Bimsara-web', '') || '/';
      var search = window.location.search;
      var hash = window.location.hash;
      sessionStorage.setItem('spa-redirect', path + search + hash);
      window.location.replace('/Bimsara-web/');
    </script>
  </head>
  <body></body>
</html>
